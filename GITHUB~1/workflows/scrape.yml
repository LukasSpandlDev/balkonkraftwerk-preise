name: Daily Price Scrape

on:
  schedule:
    # Jeden Tag um 06:00 UTC (= 08:00 Berlin Sommerzeit / 07:00 Winterzeit)
    - cron: '0 6 * * *'
  workflow_dispatch:  # erlaubt manuelles Ausloesen per Klick im GitHub-UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/products.json data/last_update.json
          if git diff --staged --quiet; then
            echo "Keine Aenderungen - nichts zu committen."
          else
            git commit -m "chore: update prices $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
